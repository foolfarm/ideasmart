<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!--
      ╔══════════════════════════════════════════════════════════════╗
      ║  IDEASMART — Meta tag di fallback per la SPA                ║
      ║  I meta tag definitivi vengono iniettati dinamicamente      ║
      ║  dal componente SEOHead in ogni pagina:                     ║
      ║  • /        → IDEASMART (hub multicanale)                   ║
      ║  • /ai      → AI4Business News                              ║
      ║  • /music   → ITsMusic                                      ║
      ╚══════════════════════════════════════════════════════════════╝
    -->

    <!-- Fallback title (sovrascritto da SEOHead) -->
    <title>IDEASMART — Testata Giornalistica Multicanale AI e Musica</title>

    <!-- Fallback description (sovrascritto da SEOHead) -->
    <meta name="description" content="IDEASMART è la testata giornalistica italiana che unisce AI4Business News e ITsMusic. Notizie, analisi e newsletter su intelligenza artificiale e industria musicale." />
    <meta name="keywords" content="IDEASMART, AI4Business, ITsMusic, intelligenza artificiale, musica, startup, newsletter" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="IDEASMART" />

    <!-- Fallback Open Graph (sovrascritto da SEOHead) -->
    <meta property="og:title" content="IDEASMART — Testata Giornalistica Multicanale AI e Musica" />
    <meta property="og:description" content="IDEASMART è la testata giornalistica italiana che unisce AI4Business News e ITsMusic. Notizie, analisi e newsletter su intelligenza artificiale e industria musicale." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="it_IT" />
    <meta property="og:site_name" content="IDEASMART" />
    <meta property="og:url" content="https://www.ideasmart.ai" />

    <!-- Fallback Twitter Card (sovrascritto da SEOHead) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="IDEASMART — Testata Giornalistica Multicanale AI e Musica" />
    <meta name="twitter:description" content="IDEASMART è la testata giornalistica italiana che unisce AI4Business News e ITsMusic." />

    <!-- Canonical fallback (sovrascritto da SEOHead) -->
    <link rel="canonical" href="https://www.ideasmart.ai" />

    <!-- Sitemap -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

    <!-- Google AdSense -->
    <meta name="google-adsense-account" content="ca-pub-7185482526978993">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7185482526978993"
     crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
</html>
